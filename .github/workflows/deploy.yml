name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Trigger Render backend deploy ────────────────────────────────────────────
  deploy-backend:
    name: Render – Backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ── Build and deploy SPA to GitHub Pages ─────────────────────────────────────
  deploy-frontend:
    name: GitHub Pages – Frontend SPA
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed by peaceiris/actions-gh-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22     # Node 22 satisfies @quasar/cli ≥ v2.4
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Quasar CLI
        run: npm install -g @quasar/cli

      - name: Build SPA
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://face-attend-api.onrender.com' }}
        run: quasar build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist/spa
          force_orphan: true
