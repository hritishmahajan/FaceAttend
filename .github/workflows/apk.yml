name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install global CLIs
        run: npm install -g @quasar/cli cordova

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Cordova platform deps
        working-directory: frontend/src-cordova
        run: npm install

      - name: Build debug APK
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: quasar build -m cordova -T android --debug

      - name: Locate APK
        id: apk
        run: |
          APK=$(find frontend/src-cordova/platforms/android -name "*.apk" | head -1)
          if [ -z "$APK" ]; then echo "No APK found"; exit 1; fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dekho-mai-aagya-debug-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Dekho Mai Aagya! APK (build ${{ github.run_number }})
          files: ${{ steps.apk.outputs.path }}
          body: Debug APK built from commit ${{ github.sha }}.
